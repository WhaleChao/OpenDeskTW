name: 建置並發布 macOS／Windows

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-14
            args: "--bundles app,dmg"
          # GitHub runner 已移除 WiX 3 驗證 MSI 所需的 VBScript 元件；
          # 採用 Tauri 官方支援的 NSIS 安裝包，避免舊式驗證器阻斷發布。
          - platform: windows-2022
            args: "--bundles nsis"
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: cross-platform/package-lock.json
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: 安裝前端與 Tauri 相依套件
        working-directory: cross-platform
        run: npm ci
      - name: 安裝並封裝內建 PDF 核心
        working-directory: cross-platform
        run: |
          python -m pip install --disable-pip-version-check pyinstaller==6.19.0 pymupdf==1.27.1 python-docx==1.2.0 openpyxl==3.1.5 python-pptx==1.0.2 pyHanko==0.34.1 pyhanko-certvalidator==0.30.2 xsdata==26.2
          npm run pdf-core:build
          npm run test:sidecar
      - name: 靜態檢查
        working-directory: cross-platform
        run: |
          npm run frontend:build
          npm run check
      - name: 核心自動測試
        working-directory: cross-platform
        run: |
          npm run test:traditional
          npm run test:contracts
          npm run test:pdf-core
          npm run test:legal
          cargo test --manifest-path src-tauri/Cargo.toml --lib
      - name: 建置並附加至 GitHub Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: cross-platform
          tagName: v__VERSION__
          releaseName: "全能文件工作台 v__VERSION__"
          releaseBody: "文字、試算表、簡報、內建 PDF 與 MAGI 一站式全繁體中文工作台。採 AGPL-3.0-or-later；本頁的 GitHub Source code 是同標籤專案原始碼，另附含 npm、Cargo、Python／PyMuPDF 上游來源、雜湊及第三方授權的「第三方對應原始碼」包。另含 macOS App／DMG、Windows NSIS 安裝程式與強制簽章熱修資訊。"
          releaseDraft: false
          prerelease: false
          updaterJsonPreferNsis: true
          args: ${{ matrix.args }}

  source-bundle:
    name: 建立 AGPL 對應原始碼包
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: cross-platform/package-lock.json
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: 安裝鎖定的建置相依套件
        working-directory: cross-platform
        run: |
          npm ci
          python -m pip install --disable-pip-version-check pyinstaller==6.19.0 pymupdf==1.27.1 python-docx==1.2.0 openpyxl==3.1.5 python-pptx==1.0.2 pyHanko==0.34.1 pyhanko-certvalidator==0.30.2 xsdata==26.2
      - name: 產生並驗證對應原始碼包
        working-directory: cross-platform
        run: npm run legal:source
      - name: 附加對應原始碼包至 GitHub Release
        working-directory: cross-platform
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          source_version=$(node -p "require('./package.json').version")
          gh release upload "v${source_version}" \
            "dist/全能文件工作台-${source_version}-第三方對應原始碼.tar.gz" \
            "dist/全能文件工作台-${source_version}-第三方對應原始碼.tar.gz.sha256" \
            --clobber
