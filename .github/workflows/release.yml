name: 建置並發布 macOS／Windows

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-14
            args: "--bundles app,dmg"
          # GitHub runner 已移除 WiX 3 驗證 MSI 所需的 VBScript 元件；
          # 採用 Tauri 官方支援的 NSIS 安裝包，避免舊式驗證器阻斷發布。
          - platform: windows-2022
            args: "--bundles nsis"
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: cross-platform/package-lock.json
      - name: 安裝前端與 Tauri 相依套件
        working-directory: cross-platform
        run: npm ci
      - name: Rust 靜態檢查
        working-directory: cross-platform
        run: npm run check
      - name: 核心自動測試
        working-directory: cross-platform
        run: cargo test --manifest-path src-tauri/Cargo.toml --lib
      - name: 建置並附加至 GitHub Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: cross-platform
          tagName: v__VERSION__
          releaseName: "OpenDesk TW v__VERSION__"
          releaseBody: "全繁體中文跨平台 Office 工作台。包含 macOS App／DMG、Windows NSIS 安裝程式與強制簽章熱修資訊。"
          releaseDraft: false
          prerelease: false
          updaterJsonPreferNsis: true
          args: ${{ matrix.args }}
